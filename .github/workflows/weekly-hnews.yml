name: Weekly Hacker News

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-hackernews
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      SEARCH_QUERY: "site:news.ycombinator.com Hacker News"
      SEARCH_ENGINE: "google"
      NUM_RESULTS: "5"
      GO111MODULE: "off"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Hacker News results
        run: |
          python app/scrape.py --engine "$SEARCH_ENGINE" --query "$SEARCH_QUERY" --num "$NUM_RESULTS" --output json > /tmp/hn-output.json

      - name: Update README with trends
        run: |
          go run ./tools/readme_trends --input /tmp/hn-output.json --readme ./README.md --max 5

      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update hacker news"
          git push
